# ──────────────────────────────────────────────────────────
# NEXUS Inventory Management System — Docker Compose
#
# Usage:
#   docker compose up --build
#
# Requires a .env file in the project root.
# Copy .env.example to .env and fill in your values.
# ──────────────────────────────────────────────────────────

services:
  # ──────────────────────────────────────────────────────
  # Python AI Service — starts first, no dependencies
  # ──────────────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    container_name: nexus-ai-service
    restart: unless-stopped
    ports:
      - "${AI_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    networks:
      - nexus-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────
  # C Backend Server — depends on AI service
  # ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    ports:
      - "${NEXUS_PORT:-8080}:8080"
    volumes:
      - nexus-data:/app/data
    env_file:
      - .env
    environment:
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NEXUS_PORT=${NEXUS_PORT:-8080}
      - NEXUS_DB_PATH=/app/data/nexus_data.db
      - AI_SERVICE_URL=http://ai-service:8000
      - NEXUS_INIT_USERNAME=${APP_USERNAME:-}
      - NEXUS_INIT_PASSWORD=${APP_PASSWORD:-}
      - NEXUS_INIT_FULLNAME=${NEXUS_INIT_FULLNAME:-Administrator}
      - NEXUS_INIT_EMAIL=${NEXUS_INIT_EMAIL:-}
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - nexus-net

  # ──────────────────────────────────────────────────────
  # Frontend (Nginx) — optional, for separate port access
  # ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - nexus-net
    profiles:
      - frontend   # only starts with: docker compose --profile frontend up

# ──────────────────────────────────────────────────────
# Network & Volumes
# ──────────────────────────────────────────────────────
networks:
  nexus-net:
    driver: bridge

volumes:
  nexus-data:
    driver: local
